
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; background: #f9f9f9; margin: 0; }
        header { display: flex; justify-content: space-between; padding: 20px; background: white; border-bottom: 1px solid #ddd; align-items: center; }
        .controls { display: flex; gap: 10px; padding: 20px; justify-content: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; padding: 20px; }
        .card { border: 2px solid transparent; padding: 15px; background: white; transition: 0.3s; border-radius: 8px; cursor: pointer; }
        .card:hover { border-color: #007bff; }
        footer { text-align: center; padding: 20px; border-top: 1px solid #ddd; }
    </style>
</head>
<body>
    <header>
        <div><strong>OSGuide</strong></div>
        <div>📱 F-Droid | 🌙</div>
    </header>
    <div class="controls">
        <input type="text" placeholder="البحث...">
        <button>ترتيب</button>
        <button>+</button>
    </div>
    <div class="grid">
        <div class="card">تطبيق 1</div>
        <div class="card">تطبيق 2</div>
        <div class="card">تطبيق 3</div>
    </div>
    <footer>F-Droid is an app catalog for FOSS.</footer>
</body>
</html>
