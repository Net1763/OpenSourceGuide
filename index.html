<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        /* التنسيق العام */
        body { font-family: sans-serif; background-color: #f5f5f5; margin: 0; padding: 20px; }

        /* الشريط العلوي */
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 40px; background-color: #fff; border-bottom: 1px solid #ddd; margin-bottom: 30px; }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 20px; }
        .logo img { width: 40px; height: 40px; }
        .header-icons { display: flex; gap: 15px; font-size: 20px; }

        /* شريط الأدوات */
        .controls { display: flex; gap: 15px; margin-bottom: 40px; justify-content: center; align-items: center; }
        input { width: 400px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button, select { padding: 10px 20px; border: 1px solid #ccc; background: #fff; border-radius: 4px; cursor: pointer; }

        /* الشبكة والبطاقات */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background-color: #2c2c2c; color: white; padding: 20px; border-radius: 8px; text-align: center; }
        .card img { width: 60px; height: 60px; background: white; border-radius: 8px; margin-bottom: 10px; }
        .card h3 { font-size: 14px; margin: 10px 0; }
        .card p { font-size: 12px; color: #bbb; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="رابط_صورة_شعارك_هنا" alt="Logo">
        OSGuide
    </div>
    <div class="header-icons">🤖 🌙</div>
</header>

<div class="controls">
    <input type="text" placeholder="Search for an illustration...">
    <select><option>Sort by: Newest</option></select>
    <button>Filters</button>
    <button>+</button>
</div>

<div class="grid">
    <!-- نموذج بطاقة تطبيق -->
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e5/F-Droid.svg" alt="F-Droid">
        <h3>F-Droid</h3>
        <p>متجر تطبيقات مفتوح المصدر.</p>
    </div>
</div>

</body>
</html>
