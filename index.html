<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        /* الشريط العلوي */
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #eee; border-radius: 8px; margin-bottom: 20px; }
        
        /* شريط الأدوات */
        .toolbar { display: flex; gap: 10px; margin-bottom: 30px; align-items: center; }
        input { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        
        /* الشبكة (Grid) */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: #333; color: white; padding: 20px; border-radius: 8px; text-align: center; }
        .card img { width: 50px; height: 50px; background: #fff; border-radius: 50%; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <div><strong>OSGuide</strong></div>
    <div>🤖 🌙</div>
</header>

<div class="toolbar">
    <input type="text" placeholder="Search for an illustration...">
    <select><option>Sort by: Newest</option></select>
    <button>Filters</button>
    <button>+</button>
</div>

<div class="grid">
    <!-- مثال لمربع تطبيق كما في الصورة -->
    <div class="card">
        <div style="background:#fff; width:50px; height:50px; margin:auto; border-radius:10px;"></div>
        <h3>اسم التطبيق</h3>
        <p>وصف قصير للتطبيق هنا.</p>
    </div>
    <div class="card">...</div>
    <div class="card">...</div>
</div>

</body>
</html>
